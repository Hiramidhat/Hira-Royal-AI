<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hira's Royal AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --royal-blue: #002366; --electric-blue: #0056e6; }
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle, #001233 0%, #000410 100%);
            color: white; display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        .chat-container {
            width: 100%; max-width: 500px; height: 85vh; 
            background: rgba(0, 20, 60, 0.3); backdrop-filter: blur(25px);
            border: 2px solid var(--electric-blue); border-radius: 30px;
            display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0, 86, 230, 0.5);
        }
        .hira-header { padding: 20px; text-align: center; border-bottom: 2px solid var(--electric-blue); }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 18px; border-radius: 20px; font-size: 0.95rem; }
        .user-message { align-self: flex-end; background: linear-gradient(135deg, #0040cc 0%, #002366 100%); }
        .ai-message { align-self: flex-start; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--electric-blue); }
        .input-area { padding: 20px; display: flex; gap: 10px; background: rgba(0, 0, 0, 0.3); border-radius: 0 0 30px 30px; }
        input { flex: 1; background: transparent; border: 1px solid var(--electric-blue); border-radius: 25px; padding: 12px; color: white; outline: none; }
        .icon-btn { background: var(--electric-blue); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
        .mic-btn { background: #b30000; }
        .mic-btn.recording { animation: pulse 1s infinite; background: #ff0000; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(255,0,0,0.7); } 100% { box-shadow: 0 0 0 10px rgba(255,0,0,0); } }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="hira-header">
            <h1 style="margin:0; font-size: 1.4rem;">HIRA'S AI ASSISTANT</h1>
            <small style="color: #6699ff;">ALHAMDULILLAH | BSAI PROJECT</small>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Say something...">
            <button class="icon-btn" onclick="sendMessage()">➤</button>
            <button class="icon-btn mic-btn" id="mic-btn" onclick="startVoice()">🎤</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 1.2; // Fast & Natural
            window.speechSynthesis.speak(utterance);
        }

        function appendMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;
            appendMessage(msg, 'user-message');
            input.value = '';
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                const data = await response.json();
                appendMessage(data.reply, 'ai-message');
                speak(data.reply);
            } catch {
                appendMessage("I'm a bit sleepy. Check your connection!", 'ai-message');
            }
        }

        function startVoice() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            const micBtn = document.getElementById('mic-btn');
            recognition.onstart = () => micBtn.classList.add('recording');
            recognition.onresult = (event) => {
                document.getElementById('user-input').value = event.results[0][0].transcript;
                micBtn.classList.remove('recording');
                sendMessage();
            };
            recognition.onerror = () => micBtn.classList.remove('recording');
            recognition.onend = () => micBtn.classList.remove('recording');
            recognition.start();
        }

        window.onload = () => {
            const welcome = "Assalamu Alaikum, Hira! 'With hardship comes ease.' How can I make your work easier today?";
            appendMessage(welcome, 'ai-message');
            speak(welcome);
        };
    </script>
</body>
</html>
